---

- name: Ansible Copy missing ini to remote
  hosts: glance_container
  tasks:

    - name: Download missing glance-api-paste.ini
      ansible.builtin.get_url:
        url: https://github.com/openstack/glance/blob/master/etc/glance-api-paste.ini
        dest: /etc/openstack_deploy/glance-api-paste.ini
      delegate_to: localhost
      run_once: true

    - name: Create a directory if it does not exist
      ansible.builtin.file:
        path: /etc/glance
        state: directory
        mode: '0755'

    - name: copying file with playbook
      become: true
      copy:
        src: /etc/openstack_deploy/glance-api-paste.ini
        dest: /etc/glance/glance-api-paste.ini
