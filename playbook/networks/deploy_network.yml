---

- name: Deploy OpenStack Networks
  hosts: localhost
  serial: 1
  gather_facts: false

  module_defaults:
    group/openstack.cloud.openstack:
      cloud: default

  tasks:

    # MARK: EXTERNE
    - name: Create EXTERNE network
      openstack.cloud.network:
        project: admin
        state: present
        name: EXTERNE
        dns_domain: opn.lab.
        external: true
        shared: true
        provider_network_type: vlan
        provider_physical_network: provider-vlan
        provider_segmentation_id: 5

    - name: Create externe subnet
      openstack.cloud.subnet:
        project: admin
        state: present
        name: externe
        network_name: EXTERNE
        cidr: 192.168.135.0/24
        dns_nameservers:
          - 192.168.133.251
        extra_attrs:
          dns_publish_fixed_ip: true
      register: externe_subnet

    # MARK: APP-NTIER
    - name: Create NTIER network
      openstack.cloud.network:
        project: app-ntier
        state: present
        name: NTIER
        dns_domain: ntier.opn.lab.
        shared: false
        provider_network_type: geneve

    - name: Create ntier subnet
      openstack.cloud.subnet:
        project: app-ntier
        state: present
        name: ntier
        network_name: NTIER
        cidr: 192.168.23.0/24
        dns_nameservers:
          - 192.168.133.249
        extra_attrs:
          dns_publish_fixed_ip: true

    - name: Create NTIER-GW router
      openstack.cloud.router:
        project: app-ntier
        name: NTIER-GW
        network: EXTERNE
        interfaces:
          - ntier
        enable_snat: true
        external_fixed_ips:
          - subnet_id: "{{ externe_subnet.id }}"
            ip_address: 192.168.135.23
        state: present

    # MARK: APP-STATUS
